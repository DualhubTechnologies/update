{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}School Dashboard{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link href="{% static 'assets/css/bootstrap.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/css/dataTables.bootstrap5.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/css/responsive.bootstrap5.min.css' %}" rel="stylesheet">
  <link href="{% static 'assets/css/custom.css' %}" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  {% block head %}{% endblock %}
</head>
<body>
  <div class="app-shell sidebar-mini">
    {% include 'partials/navbar.html' %}
    {% include 'partials/sidemenu.html' %}  
    <main class="content">
      {% block layout %}{% endblock %}
    </main>
    {% include 'partials/footer.html' %}
  </div>

  <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.datatables.net/responsive/3.0.3/js/dataTables.responsive.min.js"></script>
  <script src="https://cdn.datatables.net/responsive/3.0.3/js/responsive.bootstrap5.min.js"></script>
  <script src="{% static 'assets/js/customdatatable.js' %}"></script>
  <script src="{% static 'assets/js/toggol.js' %}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
