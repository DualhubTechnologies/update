{% load static %}
    <header class="topbar">
      <div class="topbar-inner">
        <div class="d-flex align-items-center gap-2">
          <button id="sidebarToggle" type="button" class="btn btn-outline-primary btn-sm d-none d-lg-inline-flex rounded-pill">
            <i class="bi bi-layout-sidebar-inset"></i><span class="ms-2">Menu</span>
          </button>
          <button id="sidebarMobileToggle" type="button" class="btn btn-outline-primary btn-sm d-lg-none rounded-pill">
            <i class="bi bi-list"></i>
          </button>
          <div class="d-none d-md-flex align-items-center ms-2">
            <span class="badge badge-soft secondary">School</span>
          </div>
        </div>

<div class="d-flex align-items-center gap-3 ms-auto">

  <!-- Notifications -->
  <button class="icon-pill position-relative"
          style="background: rgba(14,165,233,.10); border-color: rgba(14,165,233,.22);">
    <i class="bi bi-bell"></i>
    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
      3
    </span>
  </button>

  <!-- User Dropdown -->
  <div class="dropdown">
    <a href="#"
       class="d-flex align-items-center gap-2 text-decoration-none dropdown-toggle"
       data-bs-toggle="dropdown"
       aria-expanded="false">

<div class="d-none d-md-block text-start">
  <div class="fw-semibold small text-dark">
    {% firstof request.user.get_full_name request.user.email %}
  </div>
  <div class="text-muted small">
    {% if request.user.groups.all %}
      {{ request.user.groups.first.name }}
    {% else %}
      User
    {% endif %}
  </div>
</div>
    </a>

    <ul class="dropdown-menu dropdown-menu-end shadow-sm">
      <li>
        <a class="dropdown-item" href="#">
          <i class="bi bi-person me-2"></i> My Profile
        </a>
      </li>
      <li>
        <a class="dropdown-item" href="#">
          <i class="bi bi-key me-2"></i> Change Password
        </a>
      </li>
      <li><hr class="dropdown-divider"></li>
      <li>
        <a class="dropdown-item text-danger" href="@">
          <i class="bi bi-box-arrow-right me-2"></i> Logout
        </a>
      </li>
    </ul>
  </div>

</div>

      </div>
    </header>
